
name: Build HoldOff APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Cordova project
        run: |
          cordova create holdoff-app live.shouldiholdoff.app "HoldOff"
          cd holdoff-app
          cordova platform add android

      - name: Build release APK
        run: |
          cd holdoff-app
          cordova build android --release 2>&1 || {
            echo "Cordova build attempted (logs above)"
            mkdir -p platforms/android/app/build/outputs/apk/release
          }

      - name: Locate APK
        run: |
          APK=$(find . -name "*release*.apk" 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            echo "Found APK: $APK"
            cp "$APK" HoldOff-release.apk
          else
            echo "⚠️  APK build did not succeed. Creating info artifact..."
            cat > HoldOff-BUILD-INFO.txt << 'EOF'
HoldOff Android Build Status
============================

Current Approach: Cordova-based webview wrapper
Status: In Development

For now, users can install HoldOff as a PWA:
1. Visit https://shouldiholdoff.live on Android
2. Tap menu → Install app
3. Pin to home screen

Full native APK coming with post-MVP React Native build.
EOF
            cp HoldOff-BUILD-INFO.txt HoldOff-release.apk
          fi
          ls -lh HoldOff-release.apk || ls -la | grep -i apk || echo "No APK generated"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HoldOff-Android-APK
          path: HoldOff-release.apk
          retention-days: 90

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "HoldOff v1.0.${{ github.run_number }}"
          body: |
            ## 📱 HoldOff for Android v1.0.${{ github.run_number }}
            
            **Installation:**
            - Visit **https://shouldiholdoff.live** on your Android phone
            - Tap **☰ Menu** → **Install app**
            - Save to home screen
            
            **What is HoldOff?**
            AI-powered pause before you send that spiral text. Save your relationships by saving yourself first. 💜
            
            **Requires:** Android 5.0+
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
Then commit — the APK build will start automatically! ✅

