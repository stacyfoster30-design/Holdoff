name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    env:
      APP_URL: https://shouldiholdoff.live
      PACKAGE_ID: live.shouldiholdoff.app
      APP_NAME: Should I Hold Off

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install PWA Builder CLI
        run: npm install -g @pwabuilder/pwabuilder

      - name: Verify CLI
        run: pwabuilder --version

      - name: Build Android Package
        run: |
          mkdir -p output

          pwabuilder build \
            --platform android \
            --url "$APP_URL" \
            --packageId "$PACKAGE_ID" \
            --directory output

      - name: List Build Output
        run: |
          echo "Generated files:"
          find output -type f

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: |
            output/**/*.apk
            output/**/*.aab
            output/**/*.zip
          if-no-files-found: warn

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          generate_release_notes: true

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          files: |
            output/**/*.apk
            output/**/*.aab
            output/**/*.zip
