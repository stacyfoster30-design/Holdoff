name: Build HoldOff APK via PWA Builder

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install PWA Builder CLI
        run: npm install -g @pwabuilder/pwabuilder

      - name: Build APK from PWA
        run: |
          echo "Building APK from https://shouldiholdoff.live..."
          pwabuilder build --platform androidTWA --url https://shouldiholdoff.live --packageId live.shouldiholdoff.app --packageVersion 1.0.0 --output ./release 2>&1 || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "HoldOff Android v${{ github.run_number }}"
          body: "🎉 HoldOff for Android. Visit https://shouldiholdoff.live to install!"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
Scroll to the bottom and click "Commit changes"

✅ Done! The build runs automatically.

