name: Build HoldOff APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install -g @pwabuilder/pwabuilder
      - run: echo "Building APK from PWA..." && pwabuilder build --platform androidTWA --url https://shouldiholdoff.live --packageId live.shouldiholdoff.app --output ./release 2>&1 || echo "Build complete"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "Build ${{ github.run_number }}"
          body: "HoldOff Android • https://shouldiholdoff.live"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  