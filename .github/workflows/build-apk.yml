name: Build HoldOff APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANDROID_HOME: /usr/local/lib/android/sdk
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Accept Android SDK licenses and install tools
        run: |
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH
          
          echo "Android SDK at: $ANDROID_HOME"
          ls $ANDROID_HOME/ || echo "SDK dir listing failed"
          
          # Accept all licenses
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          
          # Install build tools and platform
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" 2>&1 | tail -5

          echo "Build tools:"
          ls $ANDROID_HOME/build-tools/ | head -5

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          # Use the exact path format bubblewrap expects
          ANDROID_SDK="/usr/local/lib/android/sdk"
          JDK_PATH="$JAVA_HOME"
          
          cat > ~/.bubblewrap/config.json << CONFIG
          {
            "jdkPath": "${JDK_PATH}",
            "androidSdkPath": "${ANDROID_SDK}"
          }
          CONFIG
          
          echo "Config written:"
          cat ~/.bubblewrap/config.json
          echo ""
          echo "Verifying SDK structure:"
          ls $ANDROID_SDK/build-tools/ | tail -3
          ls $ANDROID_SDK/platforms/ | tail -3

      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore holdoff.keystore \
            -alias holdoff \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "HoldOff2026!" \
            -keypass "HoldOff2026!" \
            -dname "CN=HoldOff, OU=Engineering, O=HoldOff, L=Denver, S=CO, C=US"
          ls -lh holdoff.keystore

      - name: Init Bubblewrap TWA project
        run: |
          bubblewrap init --manifest https://shouldiholdoff.live/manifest.webmanifest \
            --directory holdoff-twa \
            < /dev/null 2>&1
          
          echo "Project files:"
          ls -la holdoff-twa/ || echo "No directory created"

      - name: Update twa-manifest with correct signing key path
        run: |
          cd holdoff-twa
          # Update signing key path to point to keystore
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('twa-manifest.json', 'utf8'));
            m.signingKey = { path: '../holdoff.keystore', alias: 'holdoff' };
            m.packageId = 'live.holdoff';
            fs.writeFileSync('twa-manifest.json', JSON.stringify(m, null, 2));
            console.log('Manifest updated:', JSON.stringify(m.signingKey));
          "

      - name: Build signed APK
        run: |
          cd holdoff-twa
          bubblewrap build \
            --skipPwaValidation \
            --signingKeyPassword "HoldOff2026!" \
            --signingKeyStorePassword "HoldOff2026!" 2>&1
          
          echo "Build complete. APK files:"
          find . -name "*.apk" | head -10

      - name: Copy release APK
        run: |
          APK=$(find holdoff-twa -name "*.apk" | grep -v unsigned | head -1)
          [ -z "$APK" ] && APK=$(find holdoff-twa -name "*.apk" | head -1)
          echo "Using APK: $APK"
          cp "$APK" HoldOff-release.apk
          ls -lh HoldOff-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: HoldOff-Android-APK
          path: HoldOff-release.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "HoldOff for Android v1.0.${{ github.run_number }}"
          body: |
            ## 📱 HoldOff for Android
            
            AI-powered pause before you send. Built from https://shouldiholdoff.live
            
            **How to install:**
            1. Download `HoldOff-release.apk` below
            2. Open it on your Android phone
            3. Tap **Install** (allow unknown sources if prompted)
            4. Done in 30 seconds ✅
            
            Requires Android 5.0+
          files: HoldOff-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
