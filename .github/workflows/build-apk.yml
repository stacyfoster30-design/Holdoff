name: Build HoldOff APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Android SDK
        run: |
          sudo apt-get update -q
          sudo apt-get install -y wget unzip
          
          # Download command-line tools
          mkdir -p $HOME/android-sdk/cmdline-tools
          wget -q "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" -O /tmp/cmdtools.zip
          unzip -q /tmp/cmdtools.zip -d /tmp/cmdtools_extract
          mkdir -p $HOME/android-sdk/cmdline-tools/latest
          mv /tmp/cmdtools_extract/cmdline-tools/* $HOME/android-sdk/cmdline-tools/latest/
          
          export ANDROID_HOME=$HOME/android-sdk
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH
          
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH
          echo "$HOME/android-sdk/build-tools/34.0.0" >> $GITHUB_PATH
          
          # Accept all licenses
          yes | sdkmanager --sdk_root=$HOME/android-sdk --licenses 2>/dev/null || true
          
          # Install required packages
          sdkmanager --sdk_root=$HOME/android-sdk \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" 2>&1 | grep -E "(Installing|Installed|Warning|Error)" || true
          
          echo "Android SDK setup complete"
          ls $HOME/android-sdk/

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Create bubblewrap config
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json << BWCONFIG
          {
            "jdkPath": "$JAVA_HOME",
            "androidSdkPath": "$HOME/android-sdk"
          }
          BWCONFIG
          echo "Bubblewrap config:"
          cat ~/.bubblewrap/config.json

      - name: Create twa-manifest.json
        run: |
          cat > twa-manifest.json << 'MANIFEST'
          {
            "packageId": "live.holdoff",
            "host": "shouldiholdoff.live",
            "name": "HoldOff",
            "launcherName": "HoldOff",
            "display": "standalone",
            "orientation": "portrait",
            "themeColor": "#5B3CF5",
            "themeColorDark": "#5B3CF5",
            "navigationColor": "#5B3CF5",
            "navigationColorDark": "#5B3CF5",
            "navigationDividerColor": "#5B3CF5",
            "navigationDividerColorDark": "#5B3CF5",
            "backgroundColor": "#FAF6F0",
            "enableNotifications": false,
            "startUrl": "/filter",
            "iconUrl": "https://shouldiholdoff.live/icons/icon-512.png",
            "maskableIconUrl": "https://shouldiholdoff.live/icons/icon-512-maskable.png",
            "monochromeIconUrl": null,
            "appVersion": "1.0",
            "appVersionCode": 1,
            "signingKey": {
              "path": "./holdoff.keystore",
              "alias": "holdoff"
            },
            "minSdkVersion": 21,
            "targetSdkVersion": 34,
            "fallbackType": "customtabs",
            "splashScreenFadeOutDuration": 300,
            "webManifestUrl": "https://shouldiholdoff.live/manifest.webmanifest",
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "https://shouldiholdoff.live/",
            "locationDelegationEnabled": false,
            "features": {
              "locationDelegation": {"enabled": false},
              "playBilling": {"enabled": false}
            },
            "shortcuts": []
          }
          MANIFEST

      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore holdoff.keystore \
            -alias holdoff \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass HoldOff2026! \
            -keypass HoldOff2026! \
            -dname "CN=HoldOff, OU=Engineering, O=HoldOff, L=Denver, S=CO, C=US"
          echo "✅ Keystore created: $(ls -lh holdoff.keystore)"

      - name: Init bubblewrap project
        run: |
          bubblewrap init --manifest https://shouldiholdoff.live/manifest.webmanifest \
            < /dev/null 2>&1 | head -30 || true
          ls -la

      - name: Build signed APK
        run: |
          bubblewrap build \
            --skipPwaValidation \
            --signingKeyPassword HoldOff2026! \
            --signingKeyStorePassword HoldOff2026! \
            < /dev/null 2>&1
          
          echo "Build output:"
          find . -name "*.apk" -type f 2>/dev/null
          find . -name "*.aab" -type f 2>/dev/null

      - name: Package APK
        run: |
          APK=$(find . -name "*.apk" -not -path "*/unsigned/*" | head -1)
          if [ -z "$APK" ]; then
            APK=$(find . -name "*.apk" | head -1)
          fi
          echo "Found APK: $APK"
          cp "$APK" HoldOff-release.apk
          ls -lh HoldOff-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: HoldOff-Android-APK
          path: HoldOff-release.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "HoldOff for Android v1.0.${{ github.run_number }}"
          body: |
            ## 📱 HoldOff Android App
            
            AI-powered pause before you send. Built from https://shouldiholdoff.live
            
            **Install:**
            1. Download `HoldOff-release.apk`
            2. Open it on your Android phone
            3. Allow "Install from unknown sources" if prompted
            4. Tap Install — done in 30 seconds ✅
            
            Requires Android 5.0+
          files: HoldOff-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
