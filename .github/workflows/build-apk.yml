name: Build HoldOff APK

on:
  push:
    branches: [main]
    paths:
      - 'trigger-apk-build'
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK Build Tools
        run: |
          sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Generate TWA project with Bubblewrap
        run: |
          mkdir holdoff-twa && cd holdoff-twa
          bubblewrap init \
            --manifest "https://shouldiholdoff.live/manifest.webmanifest" \
            --directory . \
            --packageId "live.holdoff" \
            --name "HoldOff" \
            --launcherName "HoldOff" \
            --themeColor "#5B3CF5" \
            --backgroundColor "#FAF6F0" \
            --startUrl "/filter" \
            --iconUrl "https://shouldiholdoff.live/icons/icon-512.png" \
            --maskableIconUrl "https://shouldiholdoff.live/icons/icon-512-maskable.png" \
            --signingKeyPath "../holdoff.keystore" \
            --signingKeyAlias "holdoff" \
            --min-sdk-version 21

      - name: Generate signing keystore
        run: |
          keytool -genkey -v \
            -keystore holdoff.keystore \
            -alias holdoff \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass HoldOff2026! \
            -keypass HoldOff2026! \
            -dname "CN=HoldOff, OU=Engineering, O=HoldOff, L=Denver, S=CO, C=US"

      - name: Build APK
        working-directory: holdoff-twa
        run: |
          bubblewrap build \
            --skipPwaValidation \
            --ks ../holdoff.keystore \
            --ksAlias holdoff \
            --ksKeyPassword HoldOff2026! \
            --ksPassword HoldOff2026!

      - name: Find and rename APK
        run: |
          find . -name "*.apk" | head -5
          cp $(find . -name "*.apk" | head -1) HoldOff-release.apk
          ls -lh HoldOff-release.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: HoldOff-APK
          path: HoldOff-release.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: HoldOff Android App v1.0.${{ github.run_number }}
          body: |
            ## HoldOff for Android
            
            TWA (Trusted Web Activity) build from https://shouldiholdoff.live
            
            ### Install Instructions
            1. Download `HoldOff-release.apk`
            2. On your Android phone, open the file
            3. If prompted, tap **Settings → Allow from this source**
            4. Tap **Install**
          files: HoldOff-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
