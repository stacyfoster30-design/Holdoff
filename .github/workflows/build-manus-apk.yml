name: Build HoldOff Manus Android APK

on:
  push:
    branches: [main]
    paths:
      - 'holdoff-android-new/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx3072m -XX:MaxMetaspaceSize=512m"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK platform & build tools
        run: |
          yes | sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>/dev/null | tail -5

      - name: Make gradlew executable
        working-directory: holdoff-android-new
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version=8.6
          fi
          chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: manus-gradle-${{ hashFiles('holdoff-android-new/**/*.gradle*') }}
          restore-keys: manus-gradle-

      - name: Build debug APK
        working-directory: holdoff-android-new
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: holdoff-manus-apk
          path: holdoff-android-new/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: manus-v${{ github.run_number }}
          name: "HoldOff Manus Build ${{ github.run_number }}"
          body: |
            HoldOff Manus Android App - Kotlin + Jetpack Compose
            On-device Gemini Nano AI, default dialer/SMS, animated companions, Spiral Lock, accessibility.
            Download the APK below and install via Settings > Install unknown apps.
          files: holdoff-android-new/app/build/outputs/apk/**/*.apk
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
