name: Build HoldOff Native APK & AAB

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK platform & build tools
        run: |
          yes | sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>/dev/null | tail -5

      - name: Generate gradle wrapper
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version=8.4
          fi
          chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: gradle-

      - name: Decode keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p app/keystore
          echo "$KEYSTORE_BASE64" | base64 -d > app/keystore/holdoff-release.jks
          echo "Keystore decoded to app/keystore/holdoff-release.jks"
          ls -la app/keystore/

      - name: Build release AAB
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/app/keystore/holdoff-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleRelease --no-daemon --stacktrace

      - name: Build release APK (signed if keystore available, debug otherwise)
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/app/keystore/holdoff-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_PASSWORD" ]; then
            ./gradlew assembleRelease --no-daemon --stacktrace
          else
            ./gradlew assembleDebug --no-daemon --stacktrace
          fi

      - name: Commit APK to public/holdoff.apk
        run: |
          # Copy whichever APK was built into public/holdoff.apk for the web server to serve
          APK=$(find app/build/outputs/apk -name "*.apk" | head -1)
          if [ -n "$APK" ]; then
            mkdir -p public
            cp "$APK" public/holdoff.apk
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add public/holdoff.apk
            if git diff --staged --quiet; then
              echo "APK unchanged — nothing to commit"
            else
              git commit -m "ci: update holdoff.apk [skip ci]"
              git push
            fi
          else
            echo "No APK found — skipping commit"
          fi

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: holdoff-release-aab
          path: app/build/outputs/bundle/release/*.aab
          if-no-files-found: warn

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: holdoff-apk
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: warn

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: native-v${{ github.run_number }}
          name: "HoldOff Native Build ${{ github.run_number }}"
          body: |
            HoldOff Native Android - Real Kotlin + Jetpack Compose

            **AAB** (for Play Console upload)
            **APK** (for direct install: Settings > Install unknown apps > Install)
          files: |
            app/build/outputs/bundle/release/*.aab
            app/build/outputs/apk/**/*.apk
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
