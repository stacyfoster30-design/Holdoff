services:
  - type: web
    name: holdoff-app
    runtime: node
    rootDir: manus-web
    buildCommand: "npm install -g pnpm && pnpm install && pnpm build"
    startCommand: "node dist/index.js"
    healthCheckPath: /api/trpc/auth.me?batch=1&input=%7B%7D
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "22.13.0"

