services:
  - type: web
    name: holdoff-app
    runtime: node
    buildCommand: "npm install -g pnpm && pnpm install && pnpm run build"
    startCommand: "node dist/index.js"
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "22.13.0"

