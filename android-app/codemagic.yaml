# Codemagic cloud build pipeline — auto-builds the APK + AAB
# Trigger: push to native-android branch
# Output: signed release APK + AAB ready for Play Console
workflows:
  holdoff-android-release:
    name: HoldOff Android Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      android_signing:
        - holdoff_keystore   # uploaded once in Codemagic UI
      vars:
        PACKAGE_NAME: "com.holdoff.app"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: native-android
          include: true
          source: true
    scripts:
      - name: Set Gradle wrapper executable
        script: |
          cd android-app
          chmod +x gradlew || true
      - name: Build release APK + AAB
        script: |
          cd android-app
          ./gradlew assembleRelease bundleRelease
    artifacts:
      - android-app/app/build/outputs/apk/release/*.apk
      - android-app/app/build/outputs/bundle/release/*.aab
    publishing:
      email:
        recipients:
          - stacyfoster30@gmail.com
        notify:
          success: true
          failure: true
